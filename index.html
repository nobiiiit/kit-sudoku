<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FISDOKU - Professional Edition</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(31, 40, 51, 0.85);
      --neon-cyan: #66fcf1;
      --neon-blue: #45a29e;
      --neon-red: #ff4655;
      --neon-green: #00ff99;
      --neon-yellow: #ffd700;
      --neon-orange: #ff8c00;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 80%);
      color: #e0e6ed;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-cyan);
      text-align: center;
      font-size: 36px;
      padding: 15px 0;
      margin-bottom: 20px;
      letter-spacing: 6px;
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue);
    }

    .game-container {
      display: none; 
      grid-template-columns: 250px auto 250px;
      gap: 25px;
      align-items: start;
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    /* --- HIGHLIGHT STYLES --- */
    .cell.highlight-axis { 
        background: #161b22 !important; 
        box-shadow: inset 0 0 20px rgba(102, 252, 241, 0.15); 
        transition: background 0.1s;
    }
    .cell.highlight-match { 
        background: rgba(102, 252, 241, 0.25) !important; 
        box-shadow: inset 0 0 15px var(--neon-cyan), 0 0 10px var(--neon-cyan);
        color: #fff !important;
        text-shadow: 0 0 5px #fff;
    }
    .cell.prefilled.highlight-axis, 
    .cell.prefilled.highlight-match {
        color: var(--neon-cyan) !important;
    }

    /* --- NOTIFICATION STYLES --- */
    #notifArea {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }
    .notif-toast {
        background: rgba(11, 12, 16, 0.9);
        border-left: 4px solid var(--neon-cyan);
        color: white;
        padding: 12px 20px;
        border-radius: 4px;
        font-size: 13px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        animation: slideIn 0.3s ease-out forwards, fadeOut 0.5s ease-in 3.5s forwards;
        min-width: 200px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { transform: translateY(-20px); opacity: 0; } }

    .avatar-md { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 10px; }
    .avatar-sm { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon-cyan); vertical-align: middle; margin-right: 8px; }

    #lobbyPlayerList { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; max-height: 200px; overflow-y: auto; padding: 10px; }
    .lobby-player-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; width: 80px; text-align: center; font-size: 12px; }

    .auth-container { max-width: 400px; margin: 50px auto; text-align: center; }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; margin-bottom: 5px; color: var(--neon-cyan); font-size: 14px; }
    input { width: 100%; padding: 12px; box-sizing: border-box; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue); color: white; border-radius: 6px; outline: none; }

    #lobbyArea { display: none; text-align: center; margin-top: 50px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--neon-cyan); border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .sudoku-wrapper { display: flex; flex-direction: column; align-items: center; }
    .sudoku-grid { display: grid; grid-template-columns: repeat(6, 60px); grid-template-rows: repeat(6, 60px); gap: 4px; background: var(--neon-blue); padding: 4px; border-radius: 8px; width: fit-content; }

    .cell { width: 60px; height: 60px; background: var(--bg-color); color: white; text-align: center; line-height: 60px; font-size: 24px; font-weight: bold; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
    .cell.prefilled { background: #1a1a24; color: var(--neon-blue); cursor: default; }
    .cell.answered-by-you { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
    .cell.answered-by-other { color: var(--neon-yellow); background: rgba(255, 215, 0, 0.1); cursor: not-allowed; }
    .sudoku-grid.locked { pointer-events: none !important; opacity: 0.7; }

    .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.3s; border: none; margin-top: 10px; }
    .btn-primary { background: var(--neon-cyan); color: #000; }
    .btn-reset { border: 2px solid var(--neon-red); background: transparent; color: var(--neon-red); }
    .btn-csv { border: 2px solid var(--neon-blue); background: transparent; color: var(--neon-blue); }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .modal.hidden { display: none; }
    .modal-content { background: var(--panel-bg); border: 1px solid var(--neon-cyan); border-radius: 12px; width: 450px; padding: 25px; }
    .leaderboard-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;}

    #comboText { font-family: 'Orbitron', sans-serif; font-size: 14px; margin-top: 5px; display: block; transition: 0.3s; }
    .combo-active { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); animation: bounce 0.5s infinite alternate; }
    @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

    .correct-glow { animation: neon-pulse 0.6s ease-in-out; border: 2px solid var(--neon-green) !important; z-index: 10; }
    @keyframes neon-pulse { 0% { box-shadow: 0 0 5px var(--neon-green); transform: scale(1); } 50% { box-shadow: 0 0 25px var(--neon-green), 0 0 40px var(--neon-green); transform: scale(1.1); } 100% { box-shadow: 0 0 8px var(--neon-green); transform: scale(1); } }
    .wrong-shake { animation: neon-shake 0.4s linear; border: 2px solid var(--neon-red) !important; box-shadow: 0 0 15px var(--neon-red); }
    @keyframes neon-shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>

  <div class="header">FISDOKU</div>

  <!-- Area Notifikasi -->
  <div id="notifArea"></div>

  <div id="authArea" class="auth-container panel">
    <h3 style="color: var(--neon-yellow)">MASUK GAME</h3>
    <div class="input-group">
      <label>Nama Anda</label>
      <input type="text" id="playerName" placeholder="Contoh: Budi">
    </div>
    <div class="input-group">
      <label>Password Moderator</label>
      <input type="password" id="modPass" placeholder="Kosongkan jika Siswa">
    </div>
    <button class="btn btn-primary" onclick="handleJoin()">MASUK LOBBY</button>
  </div>

  <div id="lobbyArea" class="panel auth-container">
    <h2 id="lobbyTitle">Menunggu Game...</h2>
    <div id="myAvatarContainer"></div>
    <div class="loader"></div>
    <p id="playerCount" style="color: var(--neon-yellow); font-weight: bold;">0 Pemain Terhubung</p>
    <div id="lobbyPlayerList"></div>
    <div id="modControls" style="display: none;">
        <button class="btn btn-primary" onclick="triggerStartGame()">MULAI GAME</button>
    </div>
  </div>

  <div id="mainGameArea" class="game-container">
    <div class="panel">
      <h3 style="font-family: 'Orbitron'; color: var(--neon-yellow); text-align:center;">RANKING</h3>
      <div id="leaderboardList"></div>
    </div>

    <div class="sudoku-wrapper">
      <div id="grid" class="sudoku-grid"></div>
      <div class="bottom-buttons" style="display:flex; gap:10px; width:100%; margin-top:20px;">
        <button id="btnFinish" class="btn btn-primary" onclick="triggerFinishGame()" style="background: var(--neon-green); display:none;">SELESAI</button>
        <button id="btnReset" class="btn btn-reset" onclick="resetGameData()" style="display:none;">RESET GAME</button>
        <button id="btnDownload" class="btn btn-csv" onclick="downloadCSV()" style="display:none;">DOWNLOAD CSV</button>
      </div>
    </div>

    <div id="sidePanel" class="side-panel">
      <div class="panel" style="text-align: center; margin-bottom: 10px;">
        <div style="color:var(--neon-green)">SKOR</div>
        <div id="score" style="font-size: 32px; font-weight: bold;">0</div>
        <div id="comboText" style="display: none;">COMBO X<span id="comboVal">0</span></div>
      </div>
      <div class="panel" style="text-align: center;">
        <div style="color:var(--neon-cyan)">WAKTU</div>
        <div id="playerTimer" style="font-size: 32px; font-weight: bold;">00:00</div>
      </div>
    </div>
  </div>

  <div id="numberModal" class="modal hidden">
    <div class="modal-content" style="max-width: 250px; text-align: center;">
        <h3 style="color: var(--neon-cyan); margin-top:0;">ANGKA?</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0;">
            <button class="btn btn-csv" onclick="selectNumber(1)">1</button>
            <button class="btn btn-csv" onclick="selectNumber(2)">2</button>
            <button class="btn btn-csv" onclick="selectNumber(3)">3</button>
            <button class="btn btn-csv" onclick="selectNumber(4)">4</button>
            <button class="btn btn-csv" onclick="selectNumber(5)">5</button>
            <button class="btn btn-csv" onclick="selectNumber(6)">6</button>
        </div>
        <button class="btn btn-reset" onclick="closeModal('numberModal')">BATAL</button>
    </div>
  </div>

  <div id="questionModal" class="modal hidden">
    <div class="modal-content">
        <h3 style="color: var(--neon-cyan); margin-top:0;">SOAL FISIKA</h3>
        <div id="questionText" style="margin: 15px 0; font-size:14px;"></div>
        <div id="optionsArea" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
    </div>
  </div>

  <div id="finalModal" class="modal hidden">
    <div class="modal-content" style="text-align: center;">
        <h2 style="color: var(--neon-green); font-family: 'Orbitron';">FINAL SCORE</h2>
        <div id="finalLeaderboardList" style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 15px 0; text-align:left;"></div>
        <button class="btn btn-primary" onclick="window.location.reload()">KE MENU UTAMA</button>
    </div>
  </div>

  <script>
    const MODERATOR_PASSWORD = "fisdoku123"; 
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vReECKxgkKKOyE30wrZ1hI4a0Eo4naHaigZJ7EZe-KALKUsPJq_4pPPJc0eus6n_Sd5WVeijlYcKVBY/pub?output=csv";

    const firebaseConfig = {
      apiKey: "AIzaSyDRb1bnNWXp-0L1nzvxJgUCVhTGwAojK38",
      authDomain: "fisdoku-multiplayer.firebaseapp.com",
      databaseURL: "https://fisdoku-multiplayer-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "fisdoku-multiplayer",
      storageBucket: "fisdoku-multiplayer.appspot.com",
      messagingSenderId: "538766866299",
      appId: "1:538766866299:web:0dcac6fab57feda27dafde"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let isModerator = false;
    let currentPlayer = "";
    let score = 0;
    let comboCount = 0;
    let timerInterval;
    let totalSeconds = 0;
    let sudokuSolution = [];
    let prefilledCells = [];
    let soalMap = {};
    let jawabanMap = {};
    let soalCells = [];
    let soalOrder = [];
    let myAnsweredSoal = [];
    let currentSelectedCell = null;
    let playerAvatar = "";

    const soundCorrect = new Audio('https://github.com/nobiiiit/kit-sudoku/raw/refs/heads/main/freesound_community-funny-yay-6273.mp3'); 
    const soundWrong = new Audio('https://github.com/nobiiiit/kit-sudoku/raw/refs/heads/main/freesound_community-buzzer2-6109.mp3');

    function handleJoin() {
      const name = document.getElementById("playerName").value.trim();
      const pass = document.getElementById("modPass").value.trim();
      if (!name) return alert("Isi nama dulu!");
      currentPlayer = name;
      isModerator = (pass === MODERATOR_PASSWORD);
      playerAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${name}`;
      database.ref('players/' + name).set({
        name: name,
        avatar: playerAvatar,
        isModerator: isModerator
      });

      document.getElementById("authArea").style.display = "none";
      document.getElementById("lobbyArea").style.display = "block";
      document.getElementById("myAvatarContainer").innerHTML = `<img src="${playerAvatar}" class="avatar-md"><br><b>${name}</b>`;
      if (isModerator) {
        document.getElementById("lobbyTitle").innerText = "MODERATOR LOBBY";
        document.getElementById("modControls").style.display = "block";
      }
      listenToGameEvents();
      listenToLobby();
      listenNotifications(); // Aktifkan listener notifikasi
    }

    /* --- LOGIKA NOTIFIKASI --- */
    function sendNotification(msg) {
        database.ref('notifications').push({
            text: msg,
            time: Date.now()
        });
    }

    function listenNotifications() {
        database.ref('notifications').limitToLast(5).on('child_added', snap => {
            const data = snap.val();
            // Hanya tampilkan jika notifikasi dikirim dalam 10 detik terakhir (mencegah notif lama muncul saat reload)
            if (Date.now() - data.time < 10000) {
                showNotifUI(data.text);
            }
        });
    }

    function showNotifUI(text) {
        const area = document.getElementById('notifArea');
        const toast = document.createElement('div');
        toast.className = 'notif-toast';
        toast.innerText = text;
        area.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function listenToLobby() {
        database.ref('players').on('value', snap => {
            const players = snap.val() || {};
            const playerEntries = Object.values(players);
            document.getElementById("playerCount").innerText = `${playerEntries.length} Pemain Terhubung`;
            const listContainer = document.getElementById("lobbyPlayerList");
            listContainer.innerHTML = "";
            playerEntries.forEach(p => {
                listContainer.innerHTML += `
                    <div class="lobby-player-card">
                        <img src="${p.avatar}" style="width:40px; height:40px; border-radius:50%">
                        <div style="overflow:hidden; text-overflow:ellipsis;">${p.name}</div>
                    </div>
                `;
            });
        });
    }

    let isInitialLoad = true;
    function listenToGameEvents() {
      database.ref('roomControl/isStarted').on('value', snap => {
        if (snap.val() === true) proceedToGame();
      });
      database.ref('roomControl/isFinished').on('value', snap => {
        if (snap.val() === true) showFinalScreen();
      });
      database.ref('roomControl/isReset').on('value', snap => {
        const resetStatus = snap.val();
        if (resetStatus === true && !isInitialLoad) {
            window.location.reload();
        }
        isInitialLoad = false;
      });
    }

    async function triggerStartGame() {
      if (!isModerator) return;
      await fetchSoal();
      const sudoku = generateSudoku();
      const prefilled = pickRandom(36, 11);
      const totalSoal = Math.min(15, Object.keys(soalMap).length);
      const sCells = pickRandomExclude(36, totalSoal, prefilled);
      const sOrder = shuffle([...Array(Object.keys(soalMap).length).keys()]).slice(0, totalSoal);

      await database.ref('gameState').set({
        sudokuSolution: sudoku, prefilledCells: prefilled, soalCells: sCells, soalOrder: sOrder
      });
      database.ref('roomControl').set({ isStarted: true, isFinished: false, isReset: false });
      sendNotification("🚀 Game dimulai! Selamat bermain!");
    }

    async function proceedToGame() {
      document.getElementById("lobbyArea").style.display = "none";
      document.getElementById("mainGameArea").style.display = "grid";
      
      if (isModerator) {
        document.getElementById("sidePanel").style.display = "none";
        document.getElementById("btnFinish").style.display = "block";
        document.getElementById("btnReset").style.display = "block";
        document.getElementById("btnDownload").style.display = "block";
        document.getElementById("mainGameArea").style.gridTemplateColumns = "1fr auto";
      } else {
        startTimer();
      }
      
      const snap = await database.ref('gameState').once('value');
      const data = snap.val();
      sudokuSolution = data.sudokuSolution;
      prefilledCells = data.prefilledCells;
      soalCells = data.soalCells;
      soalOrder = data.soalOrder;

      await fetchSoal(); 
      renderGrid();
      initLeaderboard();
      listenMoves();
    }

    async function fetchSoal() {
        try {
            const res = await fetch(SHEET_CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            rows.forEach((row, idx) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    soalMap[idx] = cols.slice(0, -1).join(',').replace(/^"|"$/g, '');
                    jawabanMap[idx] = cols[cols.length-1].trim().toLowerCase();
                }
            });
        } catch (e) { console.error("Error CSV"); }
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let i = 0; i < 36; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${i}`;
        
        // Event Hover Highlight
        cell.onmouseenter = () => highlightOnHover(i);
        cell.onmouseleave = () => clearHighlight();

        if (prefilledCells.includes(i)) {
          cell.textContent = sudokuSolution[Math.floor(i/6)][i%6];
          cell.classList.add('prefilled');
        } else if (!isModerator) {
          cell.onclick = () => { currentSelectedCell = i; document.getElementById('numberModal').classList.remove('hidden'); };
        }
        grid.appendChild(cell);
      }
    }

    /* --- LOGIKA HIGHLIGHT --- */
    function highlightOnHover(index) {
        const cell = document.getElementById(`cell-${index}`);
        const val = cell.textContent.trim();
        const row = Math.floor(index / 6);
        const col = index % 6;

        for (let i = 0; i < 36; i++) {
            const targetCell = document.getElementById(`cell-${i}`);
            const tRow = Math.floor(i / 6);
            const tCol = i % 6;
            const tVal = targetCell.textContent.trim();

            // Highlight Baris & Kolom
            if (tRow === row || tCol === col) {
                targetCell.classList.add('highlight-axis');
            }

            // Highlight Angka yang Sama (khusus yang sudah terisi)
            if (val !== "" && tVal === val) {
                targetCell.classList.add('highlight-match');
            }
        }
    }

    function clearHighlight() {
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('highlight-axis', 'highlight-match');
        });
    }

    function calculatePoints(isPhysicsQuestion) {
        comboCount++;
        updateComboUI();
        if (isPhysicsQuestion) {
            if (comboCount === 2) return 60;
            if (comboCount >= 3) return 75;
            return 50;
        } else {
            if (comboCount === 2) return 35;
            if (comboCount >= 3) return 50;
            return 25;
        }
    }

    function updateComboUI() {
        const comboTxt = document.getElementById('comboText');
        const comboVal = document.getElementById('comboVal');
        if (comboCount > 1) {
            comboTxt.style.display = "block";
            comboTxt.className = "combo-active";
            comboVal.innerText = comboCount;
        } else {
            comboTxt.style.display = "none";
        }
    }

    function selectNumber(num) {
        closeModal('numberModal');
        const idx = currentSelectedCell;
        const cell = document.getElementById(`cell-${idx}`);
        const correct = sudokuSolution[Math.floor(idx/6)][idx%6];
        
        if (parseInt(num) === correct) {
            if (soalCells.includes(idx)) {
                sendNotification(`🎯 ${currentPlayer} menemukan kotak soal!`);
                openQuestionModal(idx, num);
            } else {
                soundCorrect.play();
                cell.classList.add('correct-glow');
                setTimeout(() => cell.classList.remove('correct-glow'), 600);
                let pts = calculatePoints(false);
                submitMove(idx, num, pts);
                sendNotification(`✅ ${currentPlayer} mengisi angka ${num} dengan benar!`);
            }
        } else {
            soundWrong.play();
            comboCount = 0;
            updateComboUI();
            cell.classList.add('wrong-shake');
            setTimeout(() => cell.classList.remove('wrong-shake'), 400);
            score -= 10; updateScore();
            alert("Salah Angka! -10 (Combo Reset)");
        }
    }

    function openQuestionModal(idx, num) {
        const sIdx = soalOrder[soalCells.indexOf(idx)];
        const question = soalMap[sIdx];
        const modal = document.getElementById('questionModal');
        const cell = document.getElementById(`cell-${idx}`);
        document.getElementById('questionText').innerHTML = question.includes("http") ? `<img src="${question}" style="width:100%">` : question;
        const optArea = document.getElementById('optionsArea');
        optArea.innerHTML = '';
        ['a','b','c','d','e'].forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn btn-csv'; b.innerText = opt.toUpperCase();
            b.onclick = () => {
                if (opt === jawabanMap[sIdx]) {
                    soundCorrect.play(); 
                    cell.classList.add('correct-glow');
                    setTimeout(() => cell.classList.remove('correct-glow'), 600);
                    myAnsweredSoal.push(sIdx + 1); 
                    let pts = calculatePoints(true);
                    submitMove(idx, num, pts); 
                    modal.classList.add('hidden');
                    sendNotification(`🔥 ${currentPlayer} menjawab soal FISIKA dengan benar!`);
                } else {
                  soundWrong.play(); 
                  comboCount = 0; updateComboUI();
                  cell.classList.add('wrong-shake');
                  setTimeout(() => cell.classList.remove('wrong-shake'), 400);
                  score -= 25; updateScore(); 
                  modal.classList.add('hidden'); 
                  alert("Salah Soal! -25 (Combo Reset)");
                }
            };
            optArea.appendChild(b);
        });
        modal.classList.remove('hidden');
    }

    function submitMove(idx, num, points) {
        score += points; updateScore();
        database.ref("answers/" + idx).set({ player: currentPlayer, number: num });
    }

    function listenMoves() {
      database.ref("answers").on("value", snap => {
        const moves = snap.val() || {};
        Object.entries(moves).forEach(([idx, m]) => {
          const cell = document.getElementById(`cell-${idx}`);
          if (cell) {
            cell.textContent = m.number;
            cell.classList.add(m.player === currentPlayer ? "answered-by-you" : "answered-by-other");
            cell.onclick = null;
          }
        });
      });
    }

    function initLeaderboard() {
      database.ref('leaderboard').on('value', snap => {
        const list = document.getElementById("leaderboardList");
        const finalist = document.getElementById("finalLeaderboardList");
        list.innerHTML = ""; finalist.innerHTML = "";
        const data = Object.values(snap.val() || {}).sort((a,b) => b.score - a.score);
        data.forEach((e, i) => {
          const html = `
            <div class="leaderboard-item">
            <span>
              ${i+1}. <img src="${e.avatar || ''}" class="avatar-sm"> ${e.name}
            </span> 
              <b>${e.score}</b>
            </div>`;
          list.innerHTML += html; finalist.innerHTML += html;
        });
      });
    }

    function updateScore() {
      if(isModerator) return;
      document.getElementById('score').textContent = score;
      database.ref('leaderboard/'+currentPlayer).set({ 
        name: currentPlayer, score: score, avatar: playerAvatar,
        answeredQuestions: myAnsweredSoal.join('|') });
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        totalSeconds++;
        const m = Math.floor(totalSeconds/60).toString().padStart(2,'0');
        const s = (totalSeconds%60).toString().padStart(2,'0');
        document.getElementById('playerTimer').textContent = `${m}:${s}`;
      }, 1000);
    }

    function triggerFinishGame() {
        if (isModerator && confirm("Selesai?")) {
            database.ref('roomControl/isFinished').set(true);
            sendNotification("🏁 Game telah diakhiri oleh Moderator.");
        }
    }

    function showFinalScreen() {
        clearInterval(timerInterval);
        document.getElementById('grid').classList.add('locked');
        if(!isModerator) document.getElementById('finalModal').classList.remove('hidden');
    }

    async function resetGameData() {
        if (isModerator && confirm("Yakin ingin mereset game?")) {
            try {
                await database.ref('notifications').remove(); // Bersihkan notif
                await database.ref('answers').remove();
                await database.ref('leaderboard').remove();
                await database.ref('players').remove();
                await database.ref('gameState').remove();
                await database.ref('roomControl').set({ isStarted: false, isFinished: false, isReset: true });
                alert("Game Berhasil di Reset!");
                window.location.reload(); 
            } catch (error) { alert("Terjadi kesalahan saat reset."); }
        }
    }

    function downloadCSV() {
        database.ref('leaderboard').once('value', snap => {
            let csv = "Nama,Skor,Soal\n";
            Object.values(snap.val() || {}).forEach(e => csv += `${e.name},${e.score},"${e.answeredQuestions || '-'}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = `FISDOKU_REKAP.csv`; a.click();
        });
    }

    function generateSudoku() {
      const base = [[1,2,3,4,5,6],[4,5,6,1,2,3],[2,3,1,5,6,4],[5,6,4,2,3,1],[3,1,2,6,4,5],[6,4,5,3,1,2]];
      const m = shuffle([1,2,3,4,5,6]);
      return base.map(r => r.map(v => m[v-1]));
    }
    function shuffle(a) { for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function pickRandom(t, c) { return shuffle([...Array(t).keys()]).slice(0, c); }
    function pickRandomExclude(t, c, e) { return shuffle([...Array(t).keys()].filter(i => !e.includes(i))).slice(0, c); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</body>
