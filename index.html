<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FISDOKU - Multiplayer Physics</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(31, 40, 51, 0.85);
      --neon-cyan: #66fcf1;
      --neon-blue: #45a29e;
      --neon-red: #ff4655;
      --neon-green: #00ff99;
      --neon-yellow: #ffd700;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 80%);
      color: #e0e6ed;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-cyan);
      text-align: center;
      font-size: 36px;
      padding: 15px 0;
      margin-bottom: 20px;
      letter-spacing: 6px;
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue);
    }

    .game-container {
      display: grid;
      grid-template-columns: 250px auto 250px;
      gap: 25px;
      align-items: start;
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #leaderboard h3 { 
      margin-top: 0; 
      color: var(--neon-yellow);
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      border-bottom: 1px solid var(--neon-blue);
      padding-bottom: 10px;
    }

    .leaderboard-item {
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(6, 65px);
      grid-template-rows: repeat(6, 65px);
      gap: 4px;
      background: var(--neon-blue);
      padding: 4px;
      border-radius: 8px;
    }

    .cell {
      width: 65px; height: 65px;
      background: var(--bg-color);
      color: white;
      text-align: center;
      line-height: 65px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
    }

    .cell.prefilled { background: #1a1a24; color: var(--neon-blue); cursor: default; }
    .cell.answered-by-you { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
    .cell.answered-by-other { color: var(--neon-yellow); background: rgba(255, 215, 0, 0.1); cursor: not-allowed; }

    .stat-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 15px;
    }
    .score-box { border-color: var(--neon-green); color: var(--neon-green); }
    .timer-box { border-color: var(--neon-cyan); color: var(--neon-cyan); }

    .btn-action {
      padding: 10px 15px;
      border: none;
      width: 100%;
      margin-top: 10px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
    }
    .btn-cyan { border: 2px solid var(--neon-cyan); color: var(--neon-cyan); background: transparent; }
    .btn-red { border: 2px solid var(--neon-red); color: var(--neon-red); background: transparent; }
    .btn-green { border: 2px solid var(--neon-green); color: var(--neon-green); background: transparent; }

    .modal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .hidden { display: none; }
    
    .modal-content {
      background: var(--panel-bg);
      border: 1px solid var(--neon-cyan);
      border-radius: 12px;
      width: 600px; max-width: 95%;
      color: white;
    }

    .modal-header { padding: 15px; text-align: center; border-bottom: 1px solid var(--neon-cyan); font-family: 'Orbitron'; }
    .modal-body { padding: 20px; text-align: center; max-height: 60vh; overflow-y: auto; }
    
    /* CSS UNTUK GAMBAR SOAL */
    #questionText img {
        display: block;
        margin: 0 auto 15px auto;
        max-width: 100%;
        height: auto;
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
    }

    .modal-options { display: flex; justify-content: center; gap: 10px; padding: 20px; }
    .modal-options button { width: 50px; height: 50px; font-weight: bold; cursor: pointer; }
    
    .player-input { text-align: center; margin-bottom: 20px; }
    .player-input input { padding: 10px; border-radius: 5px; border: 1px solid var(--neon-blue); background: #000; color: #fff; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="header">FISDOKU</div>

  <div class="player-input" id="playerInputBox">
    <input type="text" id="playerName" placeholder="Masukkan Nama..." />
    <button class="btn-action btn-green" style="width:auto;" onclick="startGame()">START GAME</button>
  </div>

  <div class="game-container">
    <div id="leaderboard" class="panel">
      <h3>TOP SCORE</h3>
      <div id="leaderboardList"></div>
    </div>

    <div class="sudoku-wrapper" style="display:flex; flex-direction:column; align-items:center;">
      <div id="grid" class="sudoku-grid"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-action btn-green" onclick="finishGame()">FINISH</button>
        <button class="btn-action btn-red" onclick="resetGameData()">RESET</button>
      </div>
    </div>

    <div class="side-panel">
      <div class="stat-box score-box">SKOR<br><span id="score" style="font-size:28px;">0</span></div>
      <div class="stat-box timer-box">TIMER<br><span id="playerTimer" style="font-size:28px;">00:00</span></div>
    </div>
  </div>

  <!-- Modal Soal -->
  <div id="questionModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">TANTANGAN FISIKA</div>
      <div class="modal-body"><div id="questionText"></div></div>
      <div class="modal-options">
        <button onclick="selectAnswer('a', event)">A</button>
        <button onclick="selectAnswer('b', event)">B</button>
        <button onclick="selectAnswer('c', event)">C</button>
        <button onclick="selectAnswer('d', event)">D</button>
        <button onclick="selectAnswer('e', event)">E</button>
      </div>
      <div style="display:flex; justify-content:center; gap:10px; padding:20px;">
        <button class="btn-action btn-red" style="width:auto;" onclick="giveUpQuestion()">MENYERAH (-25)</button>
        <button class="btn-action btn-green" style="width:auto;" onclick="submitAnswer()">SUBMIT</button>
      </div>
    </div>
  </div>

  <!-- Modal Input Angka Sudoku -->
  <div id="numberModal" class="modal hidden">
    <div class="modal-content" style="width: 350px;">
      <div class="modal-header">Pilih Angka</div>
      <div class="modal-options">
        <button onclick="chooseNumber(1)">1</button>
        <button onclick="chooseNumber(2)">2</button>
        <button onclick="chooseNumber(3)">3</button>
        <button onclick="chooseNumber(4)">4</button>
        <button onclick="chooseNumber(5)">5</button>
        <button onclick="chooseNumber(6)">6</button>
      </div>
      <button class="btn-action btn-red" onclick="closeNumberModal()">BATAL</button>
    </div>
  </div>

  <div id="finishModal" class="modal hidden">
    <div class="modal-content" style="padding:20px; text-align:center;">
        <h2 style="color:var(--neon-green)">GAME SELESAI!</h2>
        <p>Skor Akhir Anda: <span id="finishScoreDisplay">0</span></p>
        <button class="btn-action btn-cyan" onclick="location.reload()">MAIN LAGI</button>
    </div>
  </div>

  <script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDRb1bnNWXp-0L1nzvxJgUCVhTGwAojK38",
      authDomain: "fisdoku-multiplayer.firebaseapp.com",
      databaseURL: "https://fisdoku-multiplayer-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "fisdoku-multiplayer",
      storageBucket: "fisdoku-multiplayer.appspot.com",
      appId: "1:538766866299:web:0dcac6fab57feda27dafde"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vReECKxgkKKOyE30wrZ1hI4a0Eo4naHaigZJ7EZe-KALKUsPJq_4pPPJc0eus6n_Sd5WVeijlYcKVBY/pub?output=csv";
    
    let soalMap = {}, jawabanMap = {}, sudokuSolution = [];
    let prefilledCells = [], soalCells = [], soalOrder = [];
    let currentCell = null, score = 0, currentPlayer = "";
    let timerInterval, totalSeconds = 0, selectedAnswer = "", gameFinished = false;

    // Listeners
    function initListeners() {
      database.ref('leaderboard').on('value', snap => {
        const list = document.getElementById("leaderboardList");
        list.innerHTML = "";
        const data = snap.val() || {};
        Object.values(data).sort((a,b) => b.score - a.score).slice(0, 5).forEach((e, i) => {
          list.innerHTML += `<div class="leaderboard-item">${i+1}. ${e.name} <span style="float:right;">${e.score}</span></div>`;
        });
      });
    }
    initListeners();

    async function startGame() {
      const name = document.getElementById("playerName").value.trim();
      if (!name) return alert("Masukkan nama!");
      currentPlayer = name;
      document.getElementById('playerInputBox').style.display = 'none';

      try {
        const res = await fetch(SHEET_CSV_URL);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        rows.forEach((row, index) => {
          if(!row.trim()) return;
          const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          if(cols.length >= 2) {
            soalMap[index] = cols[0].replace(/^"|"$/g, '').trim();
            jawabanMap[index] = cols[cols.length-1].replace(/^"|"$/g, '').trim().toLowerCase();
          }
        });

        database.ref('gameState').once('value').then(snap => {
          if (snap.exists()) {
            const d = snap.val();
            sudokuSolution = d.sudokuSolution;
            prefilledCells = d.prefilledCells;
            soalCells = d.soalCells;
            soalOrder = d.soalOrder;
          } else {
            sudokuSolution = generateSudoku();
            prefilledCells = pickRandom(36, 11);
            soalCells = pickRandomExclude(36, 12, prefilledCells);
            soalOrder = shuffle([...Array(Object.keys(soalMap).length).keys()]).slice(0, 12);
            database.ref('gameState').set({ sudokuSolution, prefilledCells, soalCells, soalOrder });
          }
          renderGrid();
          startTimer();
        });
      } catch (e) { alert("Gagal memuat data soal!"); }
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let i = 0; i < 36; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        if (prefilledCells.includes(i)) {
          cell.textContent = sudokuSolution[Math.floor(i/6)][i%6];
          cell.classList.add('prefilled');
        } else {
          cell.onclick = () => {
            if(gameFinished || cell.textContent !== "") return;
            currentCell = cell;
            document.getElementById('numberModal').classList.remove('hidden');
          };
        }
        grid.appendChild(cell);
      }
      listenMoves();
    }

    function listenMoves() {
      database.ref("answers").on("value", snap => {
        const moves = snap.val() || {};
        Object.entries(moves).forEach(([idx, move]) => {
          const cell = document.querySelector(`.cell[data-index="${idx}"]`);
          if (cell && !cell.classList.contains('prefilled')) {
            cell.textContent = move.number;
            cell.classList.add(move.player === currentPlayer ? "answered-by-you" : "answered-by-other");
          }
        });
      });
    }

    // FUNGSI CHOOSE NUMBER YANG SUDAH DIPERBAIKI (TANPA ERROR SINTAKS)
    function chooseNumber(num) {
        const idx = parseInt(currentCell.dataset.index);
        const correct = sudokuSolution[Math.floor(idx/6)][idx%6];
        closeNumberModal();

        if (num === correct) {
            if (soalCells.includes(idx)) {
                currentCell.textContent = num;
                const sIdx = soalOrder[soalCells.indexOf(idx)];
                let isiSoal = soalMap[sIdx];

                if (isiSoal.includes("http")) {
                    document.getElementById('questionText').innerHTML = `
                        <p style="margin-bottom:10px; color:var(--neon-cyan)">Perhatikan Gambar:</p>
                        <img src="${isiSoal}" alt="Soal">`;
                } else {
                    document.getElementById('questionText').innerHTML = `<p>${isiSoal}</p>`;
                }
                document.getElementById('questionModal').classList.remove('hidden');
            } else {
                score += 25;
                updateScore();
                currentCell.classList.add("answered-by-you");
                database.ref("answers/" + idx).set({ player: currentPlayer, number: num });
            }
        } else {
            score -= 10;
            updateScore();
            alert("❌ Angka Sudoku Salah! Skor -10.");
        }
    }

    function submitAnswer() {
      if (!selectedAnswer) return;
      const idx = parseInt(currentCell.dataset.index);
      const sIdx = soalOrder[soalCells.indexOf(idx)];
      if (selectedAnswer === jawabanMap[sIdx]) {
        score += 50;
        alert("✅ BENAR! +50 Poin.");
        currentCell.classList.add("answered-by-you");
        database.ref("answers/" + idx).set({ player: currentPlayer, number: currentCell.textContent });
      } else {
        score -= 25;
        alert("❌ SALAH! -25 Poin.");
        currentCell.textContent = "";
      }
      updateScore();
      closeQuestion();
    }

    function giveUpQuestion() {
      score -= 25;
      updateScore();
      currentCell.textContent = "";
      closeQuestion();
    }

    function selectAnswer(choice, e) {
      selectedAnswer = choice;
      document.querySelectorAll(".modal-options button").forEach(b => b.style.background = "transparent");
      e.target.style.background = "var(--neon-green)";
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      database.ref('leaderboard/'+currentPlayer).set({name:currentPlayer, score:score});
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        totalSeconds++;
        const m = Math.floor(totalSeconds/60).toString().padStart(2,'0');
        const s = (totalSeconds%60).toString().padStart(2,'0');
        document.getElementById('playerTimer').textContent = `${m}:${s}`;
      }, 1000);
    }

    function generateSudoku() {
      const base = [[1,2,3,4,5,6],[4,5,6,1,2,3],[2,3,1,5,6,4],[5,6,4,2,3,1],[3,1,2,6,4,5],[6,4,5,3,1,2]];
      const map = shuffle([1,2,3,4,5,6]);
      return base.map(r => r.map(v => map[v-1]));
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandom(t, c) { return shuffle([...Array(t).keys()]).slice(0, c); }
    function pickRandomExclude(t, c, ex) { return shuffle([...Array(t).keys()].filter(i => !ex.includes(i))).slice(0, c); }
    
    function closeNumberModal() { document.getElementById('numberModal').classList.add('hidden'); }
    function closeQuestion() { document.getElementById('questionModal').classList.add('hidden'); selectedAnswer = ""; }
    function finishGame() { 
        gameFinished = true; clearInterval(timerInterval); 
        document.getElementById("finishScoreDisplay").textContent = score;
        document.getElementById("finishModal").classList.remove("hidden");
    }
    function resetGameData() { if(confirm("Reset Game?")) database.ref().remove().then(() => location.reload()); }
  </script>
</body>
</html>
